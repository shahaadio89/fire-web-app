<!DOCTYPE html>
<html>
<head>
    <title>Fire Detection</title>
</head>

<body style="text-align:center">

<h1>🔥 Fire Detection System</h1>

<img src="/video_feed" width="700">

<audio id="alarm" src="/static/alarm.mp3"></audio>

<script>
setInterval(() => {
    fetch('/fire_status')
    .then(res => res.json())
    .then(data => {
        if (data.fire === true) {
            document.getElementById("alarm").play();
        }
    });
}, 1000);
</script>

</body>
</html>
